<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect: encode the path as a query param and
      // redirect to index.html, which picks it up and restores the route.
      var base = '/diversion/'
      var path = location.pathname.slice(base.length)
      var search = location.search
      location.replace(
        base + '?__spa=' + encodeURIComponent(path + search)
      )
    </script>
  </head>
  <body></body>
</html>
